services:
  - type: web
    name: reactive-portfolio
    env: node
    region: oregon
    plan: free
    buildCommand: cd client && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: cd client && node build/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: PNPM_VERSION
        value: 9
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: ORIGIN
        value: https://reactive-1.onrender.com
